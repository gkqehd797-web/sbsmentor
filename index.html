<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사업부 인포 업무 가이드북</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .rich-text-content ul { list-style-type: disc; padding-left: 1.5rem; }
    .rich-text-content ol { list-style-type: decimal; padding-left: 1.5rem; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 고유 ID 생성 유틸리티 함수
    const generateId = () => '_' + Math.random().toString(36).substr(2, 9);

    // 기본 템플릿 데이터 (처음 시작 시)
    const initialData = {
      lastUpdated: new Date().toISOString(),
      sections: [
        {
          id: generateId(),
          title: "안내 섹션",
          blocks: [
            {
              id: generateId(),
              type: "text",
              content: "<b>가이드북에 오신 것을 환영합니다.</b><br/>관리자 모드를 켜서 블록을 추가하거나 수정해보세요."
            }
          ]
        }
      ]
    };

    /**
     * [컴포넌트] RichTextEditor: 텍스트 서식 편집기
     * 텍스트를 작성하고 굵게, 기울임 등의 서식을 적용합니다.
     */
    const RichTextEditor = ({ value, onChange, readOnly }) => {
      if (readOnly) {
        return <div dangerouslySetInnerHTML={{ __html: value }} className="rich-text-content text-slate-700 leading-relaxed whitespace-pre-wrap" />;
      }
      return (
        <div className="border border-blue-200 rounded-lg overflow-hidden bg-white shadow-sm focus-within:border-blue-500">
          <div className="bg-slate-50 p-1 flex flex-wrap gap-1 border-b border-blue-100">
            <button type="button" onMouseDown={e => { e.preventDefault(); document.execCommand('bold'); }} className="px-2 py-1 bg-white border rounded text-sm hover:bg-slate-100 font-bold">B</button>
            <button type="button" onMouseDown={e => { e.preventDefault(); document.execCommand('italic'); }} className="px-2 py-1 bg-white border rounded text-sm hover:bg-slate-100 italic">I</button>
            <button type="button" onMouseDown={e => { e.preventDefault(); document.execCommand('underline'); }} className="px-2 py-1 bg-white border rounded text-sm hover:bg-slate-100 underline">U</button>
            <button type="button" onMouseDown={e => { e.preventDefault(); document.execCommand('insertUnorderedList'); }} className="px-2 py-1 bg-white border rounded text-sm hover:bg-slate-100">• List</button>
          </div>
          <div contentEditable={true} onBlur={e => onChange(e.currentTarget.innerHTML)} dangerouslySetInnerHTML={{ __html: value }} className="p-3 min-h-[60px] focus:outline-none rich-text-content" />
        </div>
      );
    };

    /**
     * [컴포넌트] 블록 단위 제어 컨테이너 (레이아웃 분할 기능 포함)
     * 관리자 모드일 경우 폭 조절 및 삭제 버튼을 제공합니다.
     */
    const BlockContainer = ({ children, isAdmin, block, onUpdateBlock, onDelete }) => {
      const w = block.width || '100%';
      let widthClass = 'w-full';
      if (w === '50%') widthClass = 'w-full md:w-[calc(50%-0.5rem)]';
      if (w === '33%') widthClass = 'w-full md:w-[calc(33.333%-0.66rem)]';
      if (w === '66%') widthClass = 'w-full md:w-[calc(66.666%-0.33rem)]';

      const changeWidth = () => {
         const next = w === '100%' ? '50%' : w === '50%' ? '33%' : w === '33%' ? '66%' : '100%';
         onUpdateBlock({...block, width: next});
      };

      return (
        <div className={`relative group fade-in border border-transparent hover:border-indigo-100 rounded-2xl transition-all p-1 ${widthClass}`}>
          {isAdmin && (
            <div className="absolute right-2 -top-3 flex items-center gap-1 opacity-0 group-hover:opacity-100 transition z-30">
              <button onClick={changeWidth} className="px-2 py-1 bg-indigo-50 text-indigo-600 border border-indigo-200 text-xs font-bold rounded shadow-sm hover:bg-indigo-500 hover:text-white transition" title="블록 너비 변경">
                {w === '100%' ? '가로: 100%' : w === '50%' ? '가로: 50%' : w === '33%' ? '가로: 33%' : '가로: 66%'}
              </button>
              <button onClick={onDelete} className="w-6 h-6 bg-red-50 text-red-500 border border-red-200 rounded-full shadow-sm flex items-center justify-center hover:bg-red-500 hover:text-white transition font-bold text-sm" title="블록 삭제">✕</button>
            </div>
          )}
          {children}
        </div>
      );
    };

    /** [블록] 텍스트 블록 */
    const TextBlock = ({ data, onChange, isAdmin }) => (
      <RichTextEditor value={data.content} onChange={val => onChange({...data, content: val})} readOnly={!isAdmin} />
    );

    /** [블록] 체크리스트 블록 (항목 동적 추가/삭제 적용) */
    const ChecklistBlock = ({ data, onChange, isAdmin }) => {
      const handleCheck = (itemId) => {
        if (isAdmin) return;
        const newItems = data.items.map(i => i.id === itemId ? {...i, checked: !i.checked} : i);
        onChange({...data, items: newItems});
      };
      
      const handleReset = () => {
        const newItems = data.items.map(i => ({...i, checked: false}));
        onChange({...data, items: newItems});
      };

      const addItem = () => {
        onChange({...data, items: [...data.items, { id: generateId(), text: "새 체크 항목", checked: false }]});
      };

      const removeItem = (itemId) => {
        onChange({...data, items: data.items.filter(i => i.id !== itemId)});
      };

      const progress = data.items.length ? Math.round((data.items.filter(i => i.checked).length / data.items.length) * 100) : 0;

      return (
        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
          <div className="flex justify-between items-end mb-4">
            {isAdmin ? (
               <input value={data.title || ""} onChange={e => onChange({...data, title: e.target.value})} className="text-xl font-bold border-b focus:outline-none w-2/3" placeholder="체크리스트 제목" />
            ) : (
               <h3 className="text-xl font-bold text-slate-800">{data.title}</h3>
            )}
            {!isAdmin && <button onClick={handleReset} className="text-sm text-slate-500 hover:text-blue-600 transition">↺ 전체 해제</button>}
          </div>
          <div className="w-full bg-slate-100 rounded-full h-2 mb-6 overflow-hidden">
            <div className="bg-blue-500 h-2 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
          </div>
          <div className="space-y-3">
            {data.items.map((item, idx) => (
              <div key={item.id} className="flex items-center gap-3">
                <input type="checkbox" checked={item.checked} onChange={() => handleCheck(item.id)} disabled={isAdmin} className="w-5 h-5 text-blue-500 bg-slate-100 border-slate-300 rounded cursor-pointer" />
                {isAdmin ? (
                  <>
                    <input type="text" value={item.text} onChange={e => {
                      const newItems = [...data.items];
                      newItems[idx].text = e.target.value;
                      onChange({...data, items: newItems});
                    }} className="flex-1 border-b border-slate-200 p-1 focus:outline-none" />
                    <button onClick={() => removeItem(item.id)} className="text-red-400 hover:text-red-600 font-bold px-2">✕</button>
                  </>
                ) : (
                  <span className={`text-lg ${item.checked ? 'text-slate-400 line-through' : 'text-slate-700'}`}>{item.text}</span>
                )}
              </div>
            ))}
          </div>
          {isAdmin && (
             <button onClick={addItem} className="mt-4 w-full py-2 border-2 border-dashed border-slate-200 rounded-lg text-slate-500 hover:bg-slate-50 transition flex items-center justify-center gap-2 text-sm font-bold">
               ＋ 체크 항목 추가
             </button>
          )}
        </div>
      );
    };

    /** [블록] 카드 그리드 블록 (캐비닛 등, 항목 동적 추가/삭제 적용) */
    const CardGridBlock = ({ data, onChange, isAdmin }) => {
      const addCard = () => {
        onChange({...data, items: [...data.items, { id: generateId(), title: "새 카드", content: "내용을 입력하세요" }]});
      };
      const removeCard = (itemId) => {
        onChange({...data, items: data.items.filter(i => i.id !== itemId)});
      };

      return (
        <div className="bg-slate-50/50 p-6 rounded-2xl border border-slate-100">
           {isAdmin ? (
              <input value={data.title || ""} onChange={e => onChange({...data, title: e.target.value})} className="text-xl font-bold border-b mb-4 focus:outline-none bg-transparent w-full" placeholder="카드 그룹 제목" />
           ) : (
              data.title && <h3 className="text-xl font-bold text-slate-800 mb-4">{data.title}</h3>
           )}
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {data.items.map((item, idx) => (
              <div key={item.id} className="bg-white border border-slate-200 p-4 rounded-xl shadow-sm relative group">
                {isAdmin && <button onClick={() => removeCard(item.id)} className="absolute right-2 top-2 text-red-300 hover:text-red-500 font-bold opacity-0 group-hover:opacity-100 transition">✕</button>}
                {isAdmin ? (
                  <>
                    <input type="text" value={item.title} onChange={e => {
                      const newItems = [...data.items];
                      newItems[idx].title = e.target.value;
                      onChange({...data, items: newItems});
                    }} className="font-bold text-lg w-full border-b mb-2 focus:outline-none" />
                    <RichTextEditor value={item.content} onChange={val => {
                      const newItems = [...data.items];
                      newItems[idx].content = val;
                      onChange({...data, items: newItems});
                    }} readOnly={false} />
                  </>
                ) : (
                  <>
                    <h4 className="font-bold text-lg mb-2">{item.title}</h4>
                    <RichTextEditor value={item.content} readOnly={true} />
                  </>
                )}
              </div>
            ))}
          </div>
          {isAdmin && (
             <button onClick={addCard} className="mt-4 w-full py-3 border-2 border-dashed border-indigo-200 rounded-xl text-indigo-500 hover:bg-indigo-50 transition flex items-center justify-center font-bold">
               ＋ 카드 추가
             </button>
          )}
        </div>
      );
    };

    /** [블록] 표 블록 (행 동적 추가/삭제 적용) */
    const TableBlock = ({ data, onChange, isAdmin }) => {
      const addRow = () => {
        const newRow = { id: generateId(), cells: Array(data.headers.length).fill("") };
        onChange({...data, rows: [...data.rows, newRow]});
      };
      const removeRow = (rowId) => {
        onChange({...data, rows: data.rows.filter(r => r.id !== rowId)});
      };

      return (
        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 overflow-x-auto">
          <table className="w-full text-left border-collapse min-w-[500px]">
            <thead>
              <tr className="bg-slate-50">
                {data.headers.map((h, i) => (
                  <th key={i} className="p-3 border-b border-slate-200">
                    {isAdmin ? <input value={h} onChange={e => {
                        const newH = [...data.headers];
                        newH[i] = e.target.value;
                        onChange({...data, headers: newH});
                    }} className="bg-transparent w-full font-bold focus:outline-none border-b" /> : h}
                  </th>
                ))}
                {isAdmin && <th className="w-10"></th>}
              </tr>
            </thead>
            <tbody>
              {data.rows.map((row, rIdx) => (
                <tr key={row.id} className="border-b border-slate-100 group">
                  {row.cells.map((cell, cIdx) => (
                    <td key={cIdx} className="p-3">
                      {isAdmin ? <textarea value={cell} onChange={e => {
                          const newRows = [...data.rows];
                          newRows[rIdx].cells[cIdx] = e.target.value;
                          onChange({...data, rows: newRows});
                      }} className="w-full bg-slate-50 border border-transparent p-1 rounded focus:border-blue-300 focus:outline-none focus:bg-white resize-y min-h-[40px]" /> : cell}
                    </td>
                  ))}
                  {isAdmin && (
                    <td className="p-2 text-center">
                      <button onClick={() => removeRow(row.id)} className="text-red-400 hover:text-red-600 font-bold opacity-0 group-hover:opacity-100">✕</button>
                    </td>
                  )}
                </tr>
              ))}
            </tbody>
          </table>
          {isAdmin && (
             <button onClick={addRow} className="mt-3 py-2 px-4 border border-slate-200 rounded-lg text-slate-500 hover:bg-slate-50 transition text-sm font-bold flex items-center gap-1">
               ＋ 행 추가
             </button>
          )}
        </div>
      );
    };

    /** [블록] 스텝 블록 */
    const StepBlock = ({ data, onChange, isAdmin }) => {
      const addItem = () => onChange({...data, items: [...data.items, { id: generateId(), title: "새로운 단계", content: "설명을 입력하세요." }]});
      const removeItem = (id) => onChange({...data, items: data.items.filter(i => i.id !== id)});
      return (
        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
          <div className="space-y-4 relative before:absolute before:inset-0 before:ml-[28px] before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-slate-200">
            {data.items.map((item, idx) => (
              <div key={item.id} className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                <div className="flex items-center justify-center w-14 h-14 rounded-full border-4 border-white bg-indigo-50 text-indigo-600 font-bold text-xl shadow-sm shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10">
                  {idx + 1}
                </div>
                <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group-hover:border-indigo-300 transition-colors">
                  {isAdmin && <button onClick={() => removeItem(item.id)} className="absolute -top-2 -right-2 bg-red-100 text-red-500 w-6 h-6 rounded-full font-bold opacity-0 group-hover:opacity-100 transition z-20 flex items-center justify-center text-sm shadow-sm">✕</button>}
                  {isAdmin ? (
                    <>
                      <input type="text" value={item.title} onChange={e => { const newItems=[...data.items]; newItems[idx].title=e.target.value; onChange({...data, items:newItems}); }} className="font-bold text-lg w-full bg-transparent border-b border-slate-200 focus:outline-none mb-2 text-indigo-900" placeholder="단계 제목" />
                      <RichTextEditor value={item.content} onChange={val => { const newItems=[...data.items]; newItems[idx].content=val; onChange({...data, items:newItems}); }} readOnly={false} />
                    </>
                  ) : (
                    <>
                      <h4 className="font-bold text-lg mb-2 text-indigo-900">{item.title}</h4>
                      <RichTextEditor value={item.content} readOnly={true} />
                    </>
                  )}
                </div>
              </div>
            ))}
          </div>
          {isAdmin && <button onClick={addItem} className="mt-8 w-full py-3 border-2 border-dashed border-indigo-200 text-indigo-500 hover:bg-indigo-50 hover:text-indigo-600 transition rounded-xl font-bold">＋ 단계 추가</button>}
        </div>
      );
    };

    /** [블록] 안내 박스 (파란색) */
    const InfoBoxBlock = ({ data, onChange, isAdmin }) => (
      <div className="bg-blue-50/50 border border-blue-200 p-5 rounded-2xl flex gap-4 items-start shadow-sm">
        <div className="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xl shrink-0">ℹ️</div>
        <div className="flex-1 pt-1">
          {isAdmin ? (
            <RichTextEditor value={data.content} onChange={val => onChange({...data, content: val})} readOnly={false} />
          ) : (
             <RichTextEditor value={data.content} readOnly={true} />
          )}
        </div>
      </div>
    );

    /** [블록] 경고 박스 (노란색) */
    const WarningBoxBlock = ({ data, onChange, isAdmin }) => (
      <div className="bg-amber-50/50 border border-amber-200 p-5 rounded-2xl flex gap-4 items-start shadow-sm">
        <div className="w-10 h-10 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center text-xl shrink-0">⚠️</div>
        <div className="flex-1 pt-1">
          {isAdmin ? (
            <RichTextEditor value={data.content} onChange={val => onChange({...data, content: val})} readOnly={false} />
          ) : (
             <RichTextEditor value={data.content} readOnly={true} />
          )}
        </div>
      </div>
    );

    /** [블록] 흐름도 (단계 화살표) */
    const FlowchartBlock = ({ data, onChange, isAdmin }) => {
      const addItem = () => onChange({...data, items: [...data.items, { id: generateId(), text: "새 단계" }]});
      const removeItem = (id) => onChange({...data, items: data.items.filter(i => i.id !== id)});
      return (
        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 overflow-x-auto">
          <div className="flex items-center gap-2 min-w-max">
            {data.items.map((item, idx) => (
              <React.Fragment key={item.id}>
                <div className="relative group bg-slate-800 text-white px-5 py-3 rounded-xl font-bold shadow-sm flex items-center justify-center min-w-[100px]">
                  {isAdmin && <button onClick={() => removeItem(item.id)} className="absolute -top-2 -right-2 bg-red-100 text-red-500 w-5 h-5 flex items-center justify-center rounded-full text-xs opacity-0 group-hover:opacity-100 transition z-20">✕</button>}
                  {isAdmin ? (
                     <input type="text" value={item.text} onChange={e => { const newItems=[...data.items]; newItems[idx].text=e.target.value; onChange({...data, items:newItems}); }} className="bg-transparent focus:outline-none w-full text-center text-white" />
                  ) : item.text}
                </div>
                {idx < data.items.length - 1 && <div className="text-slate-300 text-2xl font-bold px-2">➔</div>}
              </React.Fragment>
            ))}
          </div>
          {isAdmin && <button onClick={addItem} className="mt-6 py-2 px-6 border-2 border-dashed border-slate-300 text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition rounded-lg font-bold text-sm">＋ 단계 추가</button>}
        </div>
      );
    };

    /** [블록] 사진 칸 */
    const PhotoBlock = ({ data, onChange, isAdmin }) => {
      const handleUpload = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => onChange({...data, imageUrl: event.target.result});
        reader.readAsDataURL(file);
      };
      return (
        <div className="bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
          {data.imageUrl ? (
            <div className="relative group rounded-xl overflow-hidden">
              <img src={data.imageUrl} alt="uploaded" className="w-full h-auto object-contain max-h-[600px] bg-slate-50" />
              {isAdmin && (
                <div className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                  <label className="bg-white text-slate-800 px-6 py-3 rounded-xl font-bold cursor-pointer hover:bg-slate-100 shadow-lg">
                    이미지 변경
                    <input type="file" accept="image/*" onChange={handleUpload} className="hidden" />
                  </label>
                </div>
              )}
            </div>
          ) : (
            <div className="w-full h-64 bg-slate-50 border-2 border-dashed border-slate-300 rounded-xl flex items-center justify-center hover:bg-slate-100 transition">
              {isAdmin ? (
                <label className="text-slate-500 hover:text-indigo-600 font-bold cursor-pointer flex flex-col items-center gap-3 w-full h-full justify-center">
                  <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm text-3xl">📷</div>
                  <span>클릭하여 이미지 업로드</span>
                  <input type="file" accept="image/*" onChange={handleUpload} className="hidden" />
                </label>
              ) : (
                <div className="text-slate-400 flex flex-col items-center gap-2">
                  <span className="text-3xl grayscale opacity-50">📷</span>
                  <span>등록된 이미지가 없습니다</span>
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    /** [블록] 구분선 */
    const DividerBlock = ({ isAdmin, onDelete }) => (
      <div className="py-6 flex items-center group relative">
        <div className="flex-1 border-t-2 border-dashed border-slate-200"></div>
        <div className="mx-4 text-slate-300 text-sm font-bold">✂</div>
        <div className="flex-1 border-t-2 border-dashed border-slate-200"></div>
      </div>
    );

    /** [블록] 정보 박스 (라벨·값) */
    const KeyValueBoxBlock = ({ data, onChange, isAdmin }) => {
      const addItem = () => onChange({...data, items: [...data.items, { id: generateId(), label: "항목명", value: "내용을 입력하세요" }]});
      const removeItem = (id) => onChange({...data, items: data.items.filter(i => i.id !== id)});
      return (
        <div className="bg-slate-50 border border-slate-200 p-6 rounded-2xl shadow-sm">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {data.items.map((item, idx) => (
              <div key={item.id} className="relative group flex items-center bg-white border border-slate-200 p-4 rounded-xl shadow-sm hover:border-blue-300 transition-colors">
                {isAdmin && <button onClick={() => removeItem(item.id)} className="absolute -top-2 -right-2 bg-red-100 text-red-500 w-6 h-6 flex items-center justify-center rounded-full text-xs opacity-0 group-hover:opacity-100 transition z-20 font-bold shadow-sm">✕</button>}
                <div className="w-1/3 border-r border-slate-100 pr-4 font-bold text-slate-500">
                  {isAdmin ? <input type="text" value={item.label} onChange={e => { const newItems=[...data.items]; newItems[idx].label=e.target.value; onChange({...data, items:newItems}); }} className="w-full bg-transparent focus:outline-none" /> : item.label}
                </div>
                <div className="w-2/3 pl-4 font-medium text-slate-800">
                  {isAdmin ? <input type="text" value={item.value} onChange={e => { const newItems=[...data.items]; newItems[idx].value=e.target.value; onChange({...data, items:newItems}); }} className="w-full bg-transparent focus:outline-none" /> : item.value}
                </div>
              </div>
            ))}
          </div>
          {isAdmin && <button onClick={addItem} className="mt-6 w-full py-3 border-2 border-dashed border-slate-300 text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition rounded-xl font-bold">＋ 정보 항목 추가</button>}
        </div>
      );
    };

    /**
     * 메인 애플리케이션 컴포넌트
     */
    const App = () => {
      const [isAdmin, setIsAdmin] = useState(false);
      const [showLogin, setShowLogin] = useState(false);
      const [password, setPassword] = useState('');
      
      const [data, setData] = useState(() => {
        try {
          const saved = localStorage.getItem('closeInpoDataV2');
          return saved ? JSON.parse(saved) : initialData;
        } catch (e) { return initialData; }
      });

      useEffect(() => {
        try { localStorage.setItem('closeInpoDataV2', JSON.stringify(data)); } catch (e) {}
      }, [data]);

      const handleLogin = (e) => {
        e.preventDefault();
        if (password === '1111') {
          setIsAdmin(true); setShowLogin(false); setPassword('');
        } else {
          alert('비밀번호 불일치'); setPassword('');
        }
      };

      // 전체 섹션 제어 함수
      const addSection = () => {
        setData({...data, sections: [...data.sections, { id: generateId(), title: "새 섹션", blocks: [] }]});
      };
      const updateSection = (secId, newTitle) => {
        setData({...data, sections: data.sections.map(s => s.id === secId ? {...s, title: newTitle} : s)});
      };
      const removeSection = (secId) => {
        if(!confirm("이 섹션과 내부의 모든 내용을 삭제하시겠습니까?")) return;
        setData({...data, sections: data.sections.filter(s => s.id !== secId)});
      };

      // 블록 제어 함수
      const addBlock = (secId, type) => {
        let newBlock = { id: generateId(), type };
        if(type === 'text') newBlock.content = "여기에 텍스트를 입력하세요.";
        if(type === 'checklist') newBlock = { ...newBlock, title: "새 체크리스트", items: [{id: generateId(), text: "항목 1", checked: false}] };
        if(type === 'cabinet') newBlock = { ...newBlock, title: "새 카드 그리드", items: [{id: generateId(), title: "제목", content: "내용"}] };
        if(type === 'table') newBlock = { ...newBlock, headers: ["컬럼1", "컬럼2"], rows: [{id: generateId(), cells: ["",""]}] };
        if(type === 'step') newBlock = { ...newBlock, items: [{id: generateId(), title: "단계 1", content: "내용을 입력하세요."}] };
        if(type === 'infoBox') newBlock = { ...newBlock, content: "안내 메시지를 입력하세요." };
        if(type === 'warningBox') newBlock = { ...newBlock, content: "주의 메시지를 입력하세요." };
        if(type === 'flowchart') newBlock = { ...newBlock, items: [{id: generateId(), text: "시작"}, {id: generateId(), text: "진행"}] };
        if(type === 'photo') newBlock = { ...newBlock, imageUrl: "" };
        if(type === 'keyValueBox') newBlock = { ...newBlock, items: [{id: generateId(), label: "항목명", value: "내용"}] };

        setData({
          ...data, 
          sections: data.sections.map(s => s.id === secId ? {...s, blocks: [...(s.blocks||[]), newBlock]} : s)
        });
      };

      const updateBlock = (secId, blockId, newData) => {
        setData({
          ...data,
          sections: data.sections.map(s => s.id === secId ? {...s, blocks: s.blocks.map(b => b.id === blockId ? newData : b)} : s)
        });
      };

      const removeBlock = (secId, blockId) => {
        setData({
          ...data,
          sections: data.sections.map(s => s.id === secId ? {...s, blocks: s.blocks.filter(b => b.id !== blockId)} : s)
        });
      };

      // 블록 추가 모달 상태 관리
      const [addingToSec, setAddingToSec] = useState(null);

      return (
        <div className="min-h-screen flex flex-col md:flex-row text-slate-800">
          {/* 사이드바 목차 */}
          <aside className="w-full md:w-64 bg-slate-900 text-white p-5 flex flex-col sticky top-0 md:h-screen overflow-y-auto z-20">
            <h2 className="text-xl font-black mb-6 tracking-wide text-blue-400">INFO GUIDE</h2>
            <nav className="flex-1 space-y-1">
              {data.sections.map(s => (
                <div key={s.id} className="group relative flex items-center justify-between px-3 py-2 rounded text-slate-300 hover:bg-slate-800 hover:text-white transition font-medium">
                   <a href={`#${s.id}`} className="truncate block flex-1">{s.title.replace(/<[^>]+>/g, '') || "제목 없음"}</a>
                   {isAdmin && <button onClick={() => removeSection(s.id)} className="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-500 ml-2 font-bold px-1">✕</button>}
                </div>
              ))}
              {isAdmin && (
                <button onClick={addSection} className="mt-4 w-full py-2 bg-slate-800 hover:bg-slate-700 rounded text-sm text-slate-300 font-bold flex items-center justify-center transition">
                  ＋ 목차 항목 추가
                </button>
              )}
            </nav>
            
            {/* 좌측 하단 관리자 로그인 토글 */}
            <div className="mt-6 pt-5 border-t border-slate-800">
              <label className="flex items-center cursor-pointer group w-max">
                <input type="checkbox" checked={isAdmin} onChange={(e) => e.target.checked ? setShowLogin(true) : setIsAdmin(false)} className="sr-only" />
                <div className="relative">
                  <div className={`w-11 h-6 rounded-full transition-colors duration-300 shadow-inner ${isAdmin ? 'bg-blue-500' : 'bg-slate-700'}`}></div>
                  <div className={`absolute w-4 h-4 bg-white rounded-full shadow-md transition-transform duration-300 top-1 left-1 ${isAdmin ? 'translate-x-5' : ''}`}></div>
                </div>
                <span className={`ml-3 font-bold text-sm transition-colors ${isAdmin ? 'text-blue-400' : 'text-slate-400 group-hover:text-slate-200'}`}>
                  관리자 로그인
                </span>
              </label>
            </div>
          </aside>

          {/* 메인 콘텐츠 영역 */}
          <main className="flex-1 p-6 md:p-12 overflow-y-auto">
            <div className="max-w-4xl mx-auto">
              {/* 상단 타이틀 */}
              <div className="mb-10 pb-6 border-b border-slate-200">
                <h1 className="text-3xl font-extrabold text-slate-900">가이드북</h1>
              </div>

              {/* 동적 섹션 및 블록 렌더링 */}
              {data.sections.map(section => (
                <section key={section.id} id={section.id} className="mb-16 scroll-mt-24">
                  {/* 섹션 제목 (수정 가능) */}
                  <div className="mb-6 flex items-center group">
                    {isAdmin ? (
                      <input value={section.title} onChange={e => updateSection(section.id, e.target.value)} className="text-2xl font-bold text-indigo-900 bg-transparent border-b-2 border-indigo-200 focus:border-indigo-500 outline-none w-full pb-1" placeholder="섹션 제목 입력" />
                    ) : (
                      <h2 className="text-2xl font-bold text-slate-800 border-l-4 border-indigo-500 pl-3">{section.title}</h2>
                    )}
                  </div>

                  {/* 블록 리스트 렌더링 */}
                  <div className="flex flex-wrap gap-4 items-start w-full">
                    {(section.blocks || []).map(block => (
                      <BlockContainer key={block.id} block={block} isAdmin={isAdmin} onUpdateBlock={d => updateBlock(section.id, block.id, d)} onDelete={() => removeBlock(section.id, block.id)}>
                        {block.type === 'text' && <TextBlock data={block} onChange={d => updateBlock(section.id, block.id, d)} isAdmin={isAdmin} />}
                        {block.type === 'checklist' && <ChecklistBlock data={block} onChange={d => updateBlock(section.id, block.id, d)} isAdmin={isAdmin} />}
                        {block.type === 'cabinet' && <CardGridBlock data={block} onChange={d => updateBlock(section.id, block.id, d)} isAdmin={isAdmin} />}
                        {block.type === 'table' && <TableBlock data={block} onChange={d => updateBlock(section.id, block.id, d)} isAdmin={isAdmin} />}
                        {block.type === 'step' && <StepBlock data={block} onChange={d => updateBlock(section.id, block.id, d)} isAdmin={isAdmin} />}
                        {block.type === 'infoBox' && <InfoBoxBlock data={block} onChange={d => updateBlock(section.id, block.id, d)} isAdmin={isAdmin} />}
                        {block.type === 'warningBox' && <WarningBoxBlock data={block} onChange={d => updateBlock(section.id, block.id, d)} isAdmin={isAdmin} />}
                        {block.type === 'flowchart' && <FlowchartBlock data={block} onChange={d => updateBlock(section.id, block.id, d)} isAdmin={isAdmin} />}
                        {block.type === 'photo' && <PhotoBlock data={block} onChange={d => updateBlock(section.id, block.id, d)} isAdmin={isAdmin} />}
                        {block.type === 'divider' && <DividerBlock data={block} onChange={d => updateBlock(section.id, block.id, d)} isAdmin={isAdmin} />}
                        {block.type === 'keyValueBox' && <KeyValueBoxBlock data={block} onChange={d => updateBlock(section.id, block.id, d)} isAdmin={isAdmin} />}
                      </BlockContainer>
                    ))}
                  </div>

                  {/* 블록 추가 트리거 */}
                  {isAdmin && (
                    <div className="mt-4 text-center">
                       <button onClick={() => setAddingToSec(section.id)} className="py-2 px-6 bg-white border border-slate-200 text-slate-500 rounded-full shadow-sm hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-200 transition font-bold text-sm">
                         ＋ 블록 추가
                       </button>
                    </div>
                  )}
                </section>
              ))}

              {isAdmin && (
                <div className="mt-12 pt-8 border-t border-slate-200 text-center">
                  <button onClick={addSection} className="py-4 px-8 bg-slate-100 text-slate-600 rounded-xl font-extrabold hover:bg-slate-200 transition text-lg w-full max-w-md shadow-sm">
                    ＋ 새 섹션 추가
                  </button>
                </div>
              )}
            </div>
          </main>

          {/* 블록 유형 선택 모달 */}
          {addingToSec && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={() => setAddingToSec(null)}>
              <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-2xl fade-in flex flex-col max-h-[90vh]" onClick={e => e.stopPropagation()}>
                <h3 className="text-2xl font-black mb-6 text-slate-800 border-b-2 border-slate-100 pb-4 shrink-0">추가할 항목 선택</h3>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 overflow-y-auto pr-2 flex-1" style={{ scrollbarWidth: 'thin' }}>
                  {[
                    { type: 'step', icon: '①', title: '스텝', desc: '번호 순서 항목' },
                    { type: 'checklist', icon: '☑️', title: '체크 항목', desc: '체크박스 리스트' },
                    { type: 'text', icon: '📝', title: '텍스트', desc: '자유 입력 블록' },
                    { type: 'infoBox', icon: 'ℹ️', title: '안내 박스', desc: '파란 안내 메시지' },
                    { type: 'warningBox', icon: '⚠️', title: '경고 박스', desc: '노란 주의 메시지' },
                    { type: 'table', icon: '⊞', title: '표', desc: '행·열 직접 입력' },
                    { type: 'flowchart', icon: '➡', title: '흐름도', desc: '단계 화살표' },
                    { type: 'photo', icon: '📷', title: '사진 칸', desc: '이미지 업로드' },
                    { type: 'divider', icon: '➖', title: '구분선', desc: '섹션 구분' },
                    { type: 'keyValueBox', icon: '📑', title: '정보 박스', desc: '라벨·값 정보' },
                    { type: 'cabinet', icon: '🗂️', title: '카드 그리드', desc: '캐비닛형 카드' }
                  ].map(item => (
                    <button key={item.type} onClick={() => { addBlock(addingToSec, item.type); setAddingToSec(null); }} className="flex items-center text-left p-4 border border-slate-200 rounded-2xl hover:border-indigo-400 hover:shadow-md hover:-translate-y-1 transition-all group bg-white">
                      <div className="w-14 h-14 flex items-center justify-center rounded-xl bg-slate-50 text-3xl group-hover:bg-indigo-50 transition-colors shrink-0 shadow-sm border border-slate-100">
                        {item.icon}
                      </div>
                      <div className="ml-5">
                        <div className="font-bold text-slate-800 text-lg group-hover:text-indigo-700 transition-colors">{item.title}</div>
                        <div className="text-sm text-slate-400 font-medium mt-0.5">{item.desc}</div>
                      </div>
                    </button>
                  ))}
                </div>
                <div className="mt-8 shrink-0">
                  <button onClick={() => setAddingToSec(null)} className="w-full py-4 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors text-lg">취소</button>
                </div>
              </div>
            </div>
          )}

          {/* 로그인 모달 */}
          {showLogin && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-50 p-4">
              <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm fade-in">
                <h2 className="text-2xl font-black mb-6 text-center text-slate-800">관리자 보안 접속</h2>
                <form onSubmit={handleLogin}>
                  <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="비밀번호" className="w-full border-2 border-slate-200 p-4 rounded-xl mb-6 focus:border-indigo-500 outline-none text-center text-xl tracking-widest font-bold" autoFocus />
                  <div className="flex gap-3">
                    <button type="button" onClick={() => setShowLogin(false)} className="flex-1 py-4 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200">취소</button>
                    <button type="submit" className="flex-1 py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200">확인</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
